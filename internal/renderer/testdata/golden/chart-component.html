<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart Test</title>
  <link rel="stylesheet" href="/static/reveal/reveal.css">
  <link rel="stylesheet" href="/themes/tokens.css">
  <link rel="stylesheet" href="/themes/default.css">
  <link rel="stylesheet" href="/themes/layouts.css">
</head>
<body data-accent="blue" data-slide-number="" data-slide-number-format="total">
  <div class="reveal">
    <div class="slides">
      
      <section
        data-layout="default">
        <h1>Dashboard</h1>
<div class="goslide-component" data-type="chart:bar" data-params="{&quot;color&quot;:&quot;teal&quot;,&quot;data&quot;:[96.2,93.8,97.1],&quot;labels&quot;:[&quot;Line A&quot;,&quot;Line B&quot;,&quot;Line C&quot;],&quot;title&quot;:&quot;Yield by Line&quot;,&quot;unit&quot;:&quot;%&quot;}" data-raw="" data-comp-id="s1-c0"></div>
<p>Some text after the chart.</p>

      </section>
      
    </div>
  </div>

  <div id="goslide-page-num"></div>
  <div id="goslide-toast" hidden></div>

  <script src="/static/chartjs/chart.min.js"></script>
  <script src="/static/mermaid/mermaid.min.js"></script>
  <script src="/static/reveal/reveal.js"></script>
  <script src="/static/runtime.js"></script>
  <script src="/static/reactive.js"></script>
  <script src="/static/components.js"></script>
  <script>
    Reveal.initialize({
      hash: false,
      controls: true,
      progress: true,
      keyboard: {
        13: 'next',
        8: 'prev'
      },
      overview: true,
      center: true,
      transition: 'slide'
    });
  </script>
</body>
</html>
