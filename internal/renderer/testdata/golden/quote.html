<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Test</title>
  <link rel="stylesheet" href="/static/reveal/reveal.css">
  <link rel="stylesheet" href="/themes/tokens.css">
  <link rel="stylesheet" href="/themes/minimal.css">
  <link rel="stylesheet" href="/themes/layouts.css">
</head>
<body data-accent="blue" data-slide-number="" data-slide-number-format="total">
  <div class="reveal">
    <div class="slides">
      
      <section
        data-layout="quote">
        <blockquote>
<p>The best way to predict the future is to invent it.</p>
<p>— Alan Kay</p>
</blockquote>

      </section>
      
    </div>
  </div>

  <div id="goslide-page-num"></div>
  <div id="goslide-toast" hidden></div>

  <script src="/static/reveal/reveal.js"></script>
  <script src="/static/runtime.js"></script>
  <script>
    Reveal.initialize({
      hash: false,
      controls: true,
      progress: true,
      keyboard: {
        13: 'next',
        8: 'prev'
      },
      overview: true,
      center: true,
      transition: 'slide'
    });
  </script>
</body>
</html>
