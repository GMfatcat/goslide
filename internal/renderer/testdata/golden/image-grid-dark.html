<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Grid Demo</title>
  <link rel="stylesheet" href="/static/reveal/reveal.css">
  <link rel="stylesheet" href="/themes/tokens.css">
  <link rel="stylesheet" href="/themes/dark.css">
  <link rel="stylesheet" href="/themes/layouts.css">
  <link rel="stylesheet" href="/themes/transitions.css">
</head>
<body data-accent="blue" data-slide-number="" data-slide-number-format="total">
  <div class="reveal">
    <div class="slides">
      
      <section
        data-layout="image-grid" data-columns="2">
        <div class="slide-body">
          
          <div class="region-cell"><div class="goslide-component" data-type="placeholder" data-params="{&quot;hint&quot;:&quot;Architecture diagram&quot;,&quot;icon&quot;:&quot;🗺️&quot;}" data-raw="" data-comp-id="s1-c0"></div>
</div>
          
          <div class="region-cell"><div class="goslide-component" data-type="placeholder" data-params="{&quot;hint&quot;:&quot;Performance chart&quot;,&quot;icon&quot;:&quot;📊&quot;}" data-raw="" data-comp-id="s1-c1"></div>
</div>
          
          <div class="region-cell"><p>Plain text cell.</p>
</div>
          
          <div class="region-cell"><p><img src="./img.png" alt="Fallback"></p>
</div>
          
        </div>
      </section>
      
    </div>
  </div>

  <div id="goslide-page-num"></div>
  <div id="goslide-toast" hidden></div>

  <script src="/static/chartjs/chart.min.js"></script>
  <script src="/static/mermaid/mermaid.min.js"></script>
  <script src="/static/reveal/reveal.js"></script>
  <script src="/static/reveal/plugin-notes.js"></script>
  <script src="/static/runtime.js"></script>
  <script src="/static/reactive.js"></script>
  <script src="/static/components.js"></script>
  <script>
    Reveal.initialize({
      hash: false,
      controls: true,
      progress: true,
      keyboard: {
        13: 'next',
        8: 'prev'
      },
      overview: true,
      center: true,
      transition: 'slide',
      plugins: [RevealNotes]
    });
  </script>
</body>
</html>
